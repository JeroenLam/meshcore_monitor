version: "3.8"

services:
  python-client:
    image: ghcr.io/jeroenlam/meshcore_monitor:latest
    environment:
      ES_HOST: http://elasticsearch:9200
      ES_USER: elastic
      ES_PASS: meshcore
      ES_INDEX: "meshcore"
      MC_HOST: 192.168.1.225
      MC_PORT: 5000
    depends_on:
      - elasticsearch
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.4
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      # - ELASTIC_PASSWORD=meshcore
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - ./esdata:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:9.2.4
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      # - ELASTICSEARCH_USERNAME=elastic
      # - ELASTICSEARCH_PASSWORD=meshcore
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch